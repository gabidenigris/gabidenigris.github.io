# =============================================================
#  CONFIGURAÇÃO PRINCIPAL DO SITE - Gabriela Alvim De Nigris
#  Edite apenas os campos marcados com "← EDITE AQUI"
# =============================================================

# Configurações gerais
locale                   : "pt-BR"
title                    : "Gabriela De Nigris"
title_separator          : "-"
name                     : &name "Gabriela De Nigris"
description              : &description "Economista e Pesquisadora"
url                      : https://gabidenigris.github.io
baseurl                  : ""
repository               : "gabidenigris/gabidenigris.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Comentários (deixe false por enquanto)
comments:
  provider               : false

# SEO
atom_feed:
  path                   : # blank (default) uses feed.xml

# Configurações do autor
author:
  name             : "Gabriela De Nigris"
  avatar           : "profile.jpg.png"          # ← Coloque sua foto com esse nome na pasta /images/
  bio              : "Economista"
  location         : "Brasília, Brasil"
  employer         : "Conf. Nacional do Comércio"
  email            : "denigriscontato@gmail.com"
  uri              :
  googlescholar    :                          # ← Cole aqui o link do seu Google Scholar (opcional)
  orcid            :                          # ← Cole aqui o link do seu ORCID (opcional)
  lattes           :                          # ← Cole aqui o link do seu Lattes (opcional)
  github           : "gabidenigris"
  instagram        : "gabidenigris"
  linkedin         : "gabrieladenigris"
  twitter          :                          # ← "@seutwitter" (opcional)
  researchgate     :                          # ← Link do ResearchGate (opcional)

# Configuração de leitura de arquivos
include:
  - .htaccess
  - _pages

# Excluir da build
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

# Configuração de paginação (para o blog)
paginate: 5
paginate_path: /blog/page:num/

# Configuração de posts/coleções
timezone: America/Sao_Paulo

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Valores padrão para páginas e posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Configurações do tema
sass:
  sass_dir: _sass
  style: compressed

# Analytics (opcional - cadastre no Google Analytics e cole o ID aqui)
analytics:
  provider: false
  google:
    tracking_id:
