# =============================================================
#  CONFIGURAÇÃO PRINCIPAL — Gabriela De Nigris
# =============================================================
remote_theme             : "academicpages/academicpages.github.io"
site_theme               : "default"
locale                   : "pt-BR"
title                    : "Gabriela De Nigris"
title_separator          : "-"
name                     : &name "Gabriela De Nigris"
description              : &description "Economista e Pesquisadora"
url                      : https://gabidenigris.github.io
baseurl                  : ""
repository               : "gabidenigris/gabidenigris.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 150
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               : false

atom_feed:
  path                   :

# --- Perfil do autor ---
author:
  name             : "Gabriela De Nigris"
  avatar           : "profile.jpg"
  bio              : "Economista e Pesquisadora"
  location         : "Brasília, Brasil"
  employer         : "Conf. Nacional do Comércio"
  email            : "denigriscontato@gmail.com"
  uri              :
  googlescholar    :
  orcid            :
  lattes           : "http://lattes.cnpq.br/5853375820586683"
  github           : "gabidenigris"
  instagram        : "gabidenigris"
  linkedin         : "gabrieladenigris"
  twitter          :
  researchgate     :

include:
  - .htaccess
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor

plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

timezone: America/Sao_Paulo

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# --- Layout padrão para TUDO ---
defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: single
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

analytics:
  provider: false
  google:
    tracking_id:
