# =============================================================
#  CONFIGURAÇÃO PRINCIPAL — Gabriela De Nigris
# =============================================================

# Basic Site Settings
locale                   : "pt-BR"
site_theme               : "default"
title                    : "Gabriela De Nigris"
title_separator          : "-"
name                     : &name "Gabriela De Nigris"
description              : &description "Economista e Pesquisadora"
url                      : https://gabidenigris.github.io
baseurl                  : ""
repository               : "gabidenigris/gabidenigris.github.io"
remote_theme             : "academicpages/academicpages.github.io"

teaser                   :
breadcrumbs              : false
words_per_minute         : 150
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               : false

atom_feed:
  hide                   : false
  path                   :

# --- Perfil do autor ---
author:
  avatar           : "profile.jpg"
  name             : "Gabriela De Nigris"
  bio              : "Economista e Pesquisadora"
  location         : "Brasília, Brasil"
  employer         : "Conf. Nacional do Comércio"
  email            : "denigriscontato@gmail.com"
  uri              :
  googlescholar    :
  orcid            :
  lattes           : "http://lattes.cnpq.br/5853375820586683"
  github           : "gabidenigris"
  instagram        : "gabidenigris"
  linkedin         : "gabrieladenigris"
  twitter          :
  researchgate     :

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: single
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: America/Sao_Paulo

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development

analytics:
  provider: false
  google:
    tracking_id:
